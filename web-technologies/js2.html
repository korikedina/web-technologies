<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="js2.js"></script>
    <style>
        .error{
            border-color: red;
        }
    </style>
</head>
<body>
    <form id="sanyi">
        
        Name:
        <br>
        <input type="text" minlength="10" id="name" required>
        <br>
        Age:
        <br>
        <input type="number" min="0" max="120" id="age" required>
        <br>
        Workplace:
        <br>
        <input type="text" minlength="5" id="wp" required>
        <br>
        Salary (K Ft):
        <br>
        <input type="number" min="200" id="salary" required>
        <br>
        Job description:
        <br>
        <textarea type="text" minlength="200" id="jd"></textarea>
        <br>
        Highest level of education:
        <br>
        <select >
            <option>elementary school</option>
            <option>graduation</option>
            <option>college (BSc)</option>
            <option>university (MSc)</option>
        </select>
        <br>
        Gender:
        <br>
        <input type="checkbox" id="gender">Male
        <br>
        <input type="checkbox" id="gender">Female
        <br>
        <input type="button" value="Send" onclick="checkAll()">
    </form>
</body>
</html>
